name: Publish Python package

on:
  push:
    tags:
      - '*'

env:
  DYNACONF_REDIS_URL: redis://localhost:6379/1
  DYNACONF_CACHE_URL: redis://localhost:6379/1
  DYNACONF_DATABASE__dsn: postgresql://postgres:password@localhost:5432/tests
  DYNACONF_DATABASE__superuser_dsn: postgresql://postgres:password@localhost:5432/postgres

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install --no-deps -r requirements.txt -r requirements_dev.txt
      - name: Run mdl
        uses: actionshub/markdownlint@v3.1.4
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
      - name: Run checks
        run: make check

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            bestdoctor/its_on:latest
            bestdoctor/its_on:${{ env.RELEASE_VERSION }}
